<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioCalico - Lossless HLS Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            margin-bottom: 2rem;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .player-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

        audio {
            width: 100%;
            border-radius: 10px;
            outline: none;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            min-height: 1.2rem;
            transition: all 0.3s ease;
        }

        .status.loading {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.5);
        }

        .status.playing {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.5);
        }

        .status.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
        }

        .volume-container {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: center;
        }

        .volume-slider {
            flex: 1;
            max-width: 200px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .stream-info {
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .controls {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 RadioCalico</h1>
        <p class="subtitle">Lossless HLS Audio Stream</p>
        
        <div class="player-container">
            <audio id="audioPlayer" controls preload="none">
                Your browser does not support the audio element.
            </audio>
            
            <div class="controls">
                <button id="playBtn">▶️ Play Stream</button>
                <button id="stopBtn" disabled>⏹️ Stop</button>
                <button id="refreshBtn">🔄 Refresh</button>
            </div>
            
            <div class="volume-container">
                <span>🔊</span>
                <div class="volume-slider">
                    <input type="range" id="volumeSlider" min="0" max="100" value="50">
                </div>
                <span id="volumeText">50%</span>
            </div>
            
            <div id="status" class="status">Ready to stream</div>
        </div>
        
        <div class="stream-info">
            <strong>Stream URL:</strong><br>
            <small>https://d3d4yli4hf5bmh.cloudfront.net/hls/live.m3u8</small>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const status = document.getElementById('status');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeText = document.getElementById('volumeText');
        
        const streamUrl = 'https://d3d4yli4hf5bmh.cloudfront.net/hls/live.m3u8';
        let hls = null;

        function updateStatus(message, type = '') {
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function initializeHLS() {
            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(audio);
                
                hls.on(Hls.Events.MEDIA_ATTACHED, function() {
                    updateStatus('Media attached, ready to play', 'loading');
                });
                
                hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
                    updateStatus(`Stream loaded (${data.levels.length} quality levels)`, 'loading');
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                updateStatus('Network error - trying to recover...', 'error');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                updateStatus('Media error - trying to recover...', 'error');
                                hls.recoverMediaError();
                                break;
                            default:
                                updateStatus('Fatal error: ' + data.details, 'error');
                                destroyHLS();
                                break;
                        }
                    } else {
                        console.warn('HLS warning:', data);
                    }
                });
                
            } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                audio.src = streamUrl;
                updateStatus('Using native HLS support', 'loading');
            } else {
                updateStatus('HLS not supported in this browser', 'error');
            }
        }

        function destroyHLS() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
        }

        function playStream() {
            if (!hls && !audio.src) {
                initializeHLS();
            }
            
            audio.play().then(() => {
                updateStatus('🎵 Playing live stream', 'playing');
                playBtn.disabled = true;
                stopBtn.disabled = false;
            }).catch(error => {
                updateStatus('Failed to play: ' + error.message, 'error');
                console.error('Play error:', error);
            });
        }

        function stopStream() {
            audio.pause();
            audio.currentTime = 0;
            updateStatus('Stream stopped', '');
            playBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function refreshStream() {
            stopStream();
            destroyHLS();
            audio.src = '';
            updateStatus('Stream refreshed, ready to play', '');
            setTimeout(() => {
                initializeHLS();
            }, 500);
        }

        // Event listeners
        playBtn.addEventListener('click', playStream);
        stopBtn.addEventListener('click', stopStream);
        refreshBtn.addEventListener('click', refreshStream);

        audio.addEventListener('play', () => {
            updateStatus('🎵 Playing live stream', 'playing');
            playBtn.disabled = true;
            stopBtn.disabled = false;
        });

        audio.addEventListener('pause', () => {
            updateStatus('Stream paused', '');
            playBtn.disabled = false;
            stopBtn.disabled = true;
        });

        audio.addEventListener('ended', () => {
            updateStatus('Stream ended', '');
            playBtn.disabled = false;
            stopBtn.disabled = true;
        });

        audio.addEventListener('waiting', () => {
            updateStatus('Buffering...', 'loading');
        });

        audio.addEventListener('canplay', () => {
            updateStatus('🎵 Playing live stream', 'playing');
        });

        volumeSlider.addEventListener('input', (e) => {
            const volume = e.target.value / 100;
            audio.volume = volume;
            volumeText.textContent = e.target.value + '%';
        });

        // Initialize volume
        audio.volume = 0.5;

        // Initialize HLS on page load
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('Ready to stream', '');
        });
    </script>
</body>
</html>
